name: refresh

# Twice-daily server-side refresh of the Cars.com asking medians (runs scripts/refresh.py
# on GitHub's servers, so the page updates without anyone's computer being on).
on:
  schedule:
    - cron: '23 14 * * *'   # 14:23 UTC (~07:23 PT)
    - cron: '23 2 * * *'    # 02:23 UTC (~18:23 PT)
  workflow_dispatch: {}      # also lets the dashboard ↻ button trigger it

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Refresh data.json
        run: python scripts/refresh.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "refresh: Cars.com medians $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
